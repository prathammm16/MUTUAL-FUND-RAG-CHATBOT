# Phase 8 — scheduled daily corpus refresh (10:00 AM IST = 04:30 UTC)
# SK-08: Manual "skip fetch" uses data/chunks/ (committed); full pipeline needs network fetch.

name: Daily corpus ingest

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: Skip Groww fetch — rebuild index from committed data/chunks/
        type: boolean
        default: true

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure environment
        run: cp .env.example .env

      - name: Run daily ingest
        env:
          EMBEDDING_PROVIDER: local
          EMBEDDING_BACKEND: fastembed
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
          EMBEDDING_AUTO_BGE: "true"
          INDEX_BATCH_SIZE: "16"
          VECTOR_STORE_PATH: vector_store
          INGEST_CRON_SCHEDULE: "0 10 * * *"
          INGEST_TIMEZONE: Asia/Kolkata
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          chmod +x scripts/reindex.sh
          if [ "${{ github.event_name }}" = "schedule" ] || \
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_fetch }}" = "false" ]; }; then
            echo "Full pipeline: fetch Groww pages → parse → chunk → index"
            bash scripts/reindex.sh
          else
            echo "Offline rebuild: index committed data/chunks/ (data/raw/ is not in git)"
            python scripts/build_index.py --reset
          fi

      - name: Verify index
        run: python -c "from ingestion.index import get_indexed_chunk_count, validate_indexed_store; e=validate_indexed_store('vector_store'); assert not e, e; assert get_indexed_chunk_count('vector_store') >= 40"
